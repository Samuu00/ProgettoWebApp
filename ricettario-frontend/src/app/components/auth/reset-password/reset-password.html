<html lang="it">
<head>
  <title>Reset della password</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="reset-password.css">
</head>
<div class="page-wrapper">
  <div class="prof-blob prof-b1"></div>
  <div class="prof-blob prof-b2"></div>
  <div class="prof-sketch prof-icon-1">🧁</div>
  <div class="prof-sketch prof-icon-2">🍷</div>

  <div class="prof-page-container">
    <div class="prof-content-wrapper">
      <header class="adm-header">
        <div class="header-title-box">
          <div class="title-decorator"></div>
          <h1>Security</h1>
          <div class="title-decorator"></div>
        </div>
        <p>Affina le tue credenziali d'accesso</p>
      </header>

      <div class="hero-card">
        <div class="chef-identity">
          <div class="avatar-wrapper">
            <div class="avatar">👨‍🍳</div>
            <div class="avatar-ring"></div>
          </div>
          <div class="chef-info">
            <h2>Chef Access</h2>
            <p class="chef-email">Security Management</p>
            <span class="chef-badge">Account Protection</span>
          </div>
        </div>

        <div class="vertical-divider"></div>

        <div class="edit-profile-box">
          @if (!successMess) {
            <div class="edit-profile-form">
              <div class="form-section-title">
                <h3>Nuova Password</h3>
              </div>

              <div class="form-group">
                <label for="newPassword">Password segreta 🔑</label>
                <div class="input-container">
                  <input
                    [type]="showPassword ? 'text' : 'password'"
                    class="gourmet-input"
                    [class.input-error]="errorMess"
                    [(ngModel)]="newPassword"
                    (input)="validatePasswordInline()"
                    name="newPassword"
                    id="newPassword"
                    placeholder="Minimo 8 caratteri..."
                    autocomplete="new-password"
                  />
                  <span class="password-toggle" (click)="togglePassword()">
                    {{ showPassword ? '🙈' : '👁️' }}
                  </span>
                </div>
                @if (errorMess) {
                  <span class="inline-error-text">{{ errorMess }}</span>
                }
              </div>

              <button
                type="button"
                class="btn-action btn-primary"
                (click)="onReset()"
                [disabled]="newPassword.length < 8 || errorMess !== ''">
                Salva Ricetta
              </button>
            </div>
          } @else {
            <div class="success-content">
              <div class="success-icon">✨</div>
              <h3>Aggiornata!</h3>
              <p>{{ successMess }}</p>
              <button type="button" class="btn-action btn-primary" routerLink="/login">
                Torna al Login
              </button>
            </div>
          }
        </div>
      </div>
    </div>
  </div>
</div>
<app-footer></app-footer>
</html>
