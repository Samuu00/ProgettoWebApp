<svg viewBox="0 0 400 550" xmlns="http://www.w3.org/2000/svg" class="chef-vector">
  <defs>
    <radialGradient id="faceGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe0bd" />
      <stop offset="100%" stop-color="#ffd099" />
    </radialGradient>
    <linearGradient id="hatGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f0f0f0" />
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
      <feOffset dx="0" dy="4" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.2" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <g class="legs" filter="url(#softShadow)">
    <path d="M165 430 L160 490 L130 490 Q120 490 120 500 L120 515 L185 515 L185 430 Z" fill="#1a1a1a"/>
    <path d="M235 430 L240 490 L270 490 Q280 490 280 500 L280 515 L215 515 L215 430 Z" fill="#1a1a1a"/>
  </g>

  <g class="body" filter="url(#softShadow)">
    <path d="M145 230 L255 230 Q285 230 290 430 L110 430 Q115 230 145 230 Z" fill="url(#hatGradient)" stroke="#dcdcdc" stroke-width="1.5"/>

    <path d="M165 230 Q200 270 235 230 L210 215 L190 215 Z" fill="#e63946" stroke="#b22222" stroke-width="1"/>
    <circle cx="200" cy="235" r="5" fill="#b22222" />

    <g fill="#4a5568" opacity="0.8">
      <circle cx="170" cy="290" r="4.5"/> <circle cx="230" cy="290" r="4.5"/>
      <circle cx="170" cy="335" r="4.5"/> <circle cx="230" cy="335" r="4.5"/>
      <circle cx="170" cy="380" r="4.5"/> <circle cx="230" cy="380" r="4.5"/>
    </g>

    <path d="M145 245 Q80 280 100 380" fill="none" stroke="#ffffff" stroke-width="26" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M255 245 Q320 280 300 380" fill="none" stroke="#ffffff" stroke-width="26" stroke-linecap="round" stroke-linejoin="round"/>

    <circle cx="100" cy="390" r="15" fill="#ffe0bd"/>
    <circle cx="300" cy="390" r="15" fill="#ffe0bd"/>
  </g>

  <g class="chef-head-group">
    <path d="M130 135 Q130 30 200 30 Q270 30 270 135 L260 185 L140 185 Z" fill="url(#hatGradient)" stroke="#ccc" stroke-width="1.5"/>
    <g stroke="#f0f0f0" stroke-width="2" stroke-linecap="round">
      <path d="M165 45 Q170 100 165 150" />
      <path d="M200 40 Q205 100 200 150" />
      <path d="M235 45 Q230 100 235 150" />
    </g>

    <circle cx="200" cy="215" r="68" fill="url(#faceGradient)" stroke="#e0b080" stroke-width="1"/>

    <circle cx="155" cy="235" r="12" fill="#ffb6c1" opacity="0.4" />
    <circle cx="245" cy="235" r="12" fill="#ffb6c1" opacity="0.4" />

    <circle cx="132" cy="220" r="13" fill="#ffd099"/>
    <circle cx="268" cy="220" r="13" fill="#ffd099"/>

    <g class="gaze-elements">
      <g class="eye-group">
        <ellipse cx="172" cy="208" rx="15" ry="18" fill="white" stroke="#e0b080" stroke-width="0.5"/>
        <circle class="chef-eye eye-l" cx="172" cy="208" r="8" fill="#2d3748"/>
        <circle cx="176" cy="203" r="3" fill="white"/>
      </g>
      <g class="eye-group">
        <ellipse cx="228" cy="208" rx="15" ry="18" fill="white" stroke="#e0b080" stroke-width="0.5"/>
        <circle class="chef-eye eye-r" cx="228" cy="208" r="8" fill="#2d3748"/>
        <circle cx="232" cy="203" r="3" fill="white"/>
      </g>

      <path d="M192 225 Q200 235 208 225" fill="none" stroke="#e0b080" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M175 260 Q200 295 225 260 Z" fill="#4a3728" />
        <path d="M185 282 Q200 292 215 282" fill="#ff7f50" opacity="0.8" />
        <path d="M175 260 Q200 295 225 260" fill="none" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>

    </g>
  </g>
</svg>
